name: CI

on:
  pull_request:
  push:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,office,images,magic,llm]"
          python -m pip check

      - name: Run tests
        run: |
          python -m pytest -q

      - name: Detection-quality gate (regex, hermetic)
        run: |
          # Deterministic, offline regression gate on the synthetic ground truth.
          # Regex-only requires no model downloads. A drop below the threshold means
          # a regex pattern or the validation/context-gating pipeline regressed.
          python -m core.cli evaluate eval/datasets/synthetic_de.json \
            --engines regex --fail-under 0.80
          # English dataset exercises non-DE formats (e.g. IBANs containing letters).
          python -m core.cli evaluate eval/datasets/synthetic_en.json \
            --engines regex --fail-under 0.95

      - name: Extraction-quality gate
        run: |
          # Verifies the file processors still pull the expected text (e.g. CSV
          # column-header context) out of the sample documents.
          python -m core.cli eval-extraction eval/datasets/extraction/manifest.json \
            --fail-under 1.0

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install "ruff>=0.8.0"

      - name: Ruff
        run: |
          python -m ruff check core file_processors validators api analytics scripts tests eval
          python -m ruff format --check core file_processors validators api analytics scripts tests eval

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,office,images,magic,llm]"

      - name: mypy
        run: |
          python -m mypy

  i18n:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install babel
        run: |
          python -m pip install --upgrade pip
          python -m pip install "babel>=2.14.0"

      - name: Catalog drift + completeness gate
        run: |
          # Fails if core/cli.py or core/scan_reporting.py contain strings not yet
          # extracted into locales/base.pot, or if the de/en catalogs have
          # fuzzy/untranslated entries.
          python scripts/update_catalog.py check

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install bandit pip-audit
          python -m pip install --upgrade setuptools wheel
          python -m pip install -e ".[office,images,magic,llm]"
          python -m pip check

      - name: Bandit
        run: |
          # Fail on medium+ severity and confidence findings.
          bandit -q -r core file_processors validators api analytics -x tests --severity-level medium --confidence-level medium

      - name: pip-audit
        run: |
          # Audit installed dependencies in this job's environment.
          # Skip editable installs (this repository) to avoid "not on PyPI" noise.
          pip-audit -l --skip-editable --progress-spinner off

